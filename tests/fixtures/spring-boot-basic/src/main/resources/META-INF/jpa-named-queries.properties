# Spring Data reads named queries from this exact file. Spring Tools treats it
# as the `jpa-query-properties` language, which is what turns on JPQL semantic
# tokens and the NamedQueryPropertiesReconcileEngine for the values below.
Greeting.findAllOrdered=select g from Greeting g order by g.message
Greeting.findByMessage=select g from Greeting g where g.message = ?1

# Deliberately broken so the reconciler has something to report: `form` is not a
# JPQL keyword. A JPQL_SYNTAX diagnostic here proves the file reached the JPA
# component set rather than the ordinary Boot properties one.
Greeting.broken=select g form Greeting g
