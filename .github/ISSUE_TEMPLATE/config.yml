blank_issues_enabled: false
contact_links:
  - name: Report a security vulnerability (private)
    url: https://github.com/luceat-lux-vestra/zed-spring-tools/security/advisories/new
    about: >-
      Never open a public issue for a vulnerability. Private reporting is enabled on
      this repository; see SECURITY.md for scope and expectations.
  - name: What is tested, and what is not
    url: https://github.com/luceat-lux-vestra/zed-spring-tools/blob/main/COMPATIBILITY.md
    about: >-
      Runtime evidence is still limited to macOS arm64 with JDK 25 and named
      feature slices. Check here before reporting another host or combination.
  - name: Known limitations
    url: https://github.com/luceat-lux-vestra/zed-spring-tools/blob/main/LIMITATIONS.md
    about: >-
      Most VS Code Spring Tools capabilities are not implemented yet, and some known
      defects are already recorded. Please check before filing.
